<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obsidian Web Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebarPanel" aria-label="Vault navigation">
        <div class="brand">
          <div>
            <h1>Vault Viewer</h1>
            <p id="vaultStatus">Sample vault</p>
          </div>
          <button id="sidebarPinButton" class="icon-button" type="button" aria-pressed="false" aria-label="사이드바 고정" title="사이드바 고정">📍</button>
        </div>

        <div class="search-row">
          <label class="search-box">
            <span>검색</span>
            <input id="searchInput" type="search" placeholder="파일명 검색" autocomplete="off" />
          </label>
          <div class="search-options" aria-label="검색 옵션">
            <label title="대소문자 구분"><input id="caseSearchToggle" type="checkbox" /> <span>Aa</span></label>
            <label title="정규식"><input id="regexSearchToggle" type="checkbox" /> <span>.*</span></label>
          </div>
        </div>

        <div class="tree-sort" aria-label="트리 정렬">
          <select id="treeSortSelect" aria-label="정렬 기준">
            <option value="name">이름순</option>
            <option value="updated">업데이트순</option>
            <option value="created" selected>생성순</option>
            <option value="size">크기순</option>
            <option value="type">종류순</option>
          </select>
          <button id="treeSortDirectionButton" type="button" aria-label="정렬 방향: 역배" title="정렬 방향: 역배">↓</button>
        </div>

        <div class="tree-actions" aria-label="트리 제어">
          <button id="expandTreeButton" type="button">모두 펼치기</button>
          <button id="revealCurrentButton" type="button">현재 위치</button>
          <button id="collapseTreeButton" type="button">모두 접기</button>
        </div>

        <nav id="fileTree" class="file-tree" aria-label="Vault files"></nav>

        <div class="sidebar-options">
          <button id="editButton" type="button" disabled aria-label="Obsidian에서 열기" title="Obsidian">
            <svg class="obsidian-logo" aria-hidden="true" viewBox="0 0 64 64">
              <path d="M23 3 9 22l8 33 21 6 17-25L40 7Z" />
              <path d="M23 3 40 7l-9 16L9 22Z" />
              <path d="M31 23 55 36 38 61 17 55Z" />
              <path d="M31 23 40 7l15 29Z" />
            </svg>
          </button>
          <button id="themeButton" class="sidebar-theme-button" type="button" aria-label="테마 변경" title="테마 변경">🌙</button>
          <button id="optionsButton" type="button" aria-haspopup="dialog" aria-expanded="false" aria-label="옵션" title="옵션">⚙️</button>
        </div>
        <div id="sidebarResizeHandle" class="sidebar-resize-handle" role="separator" aria-orientation="vertical" aria-label="사이드바 크기 조절"></div>
      </aside>

      <main class="content-pane">
        <header class="note-header">
          <div class="header-left">
            <button id="sidebarToggle" class="icon-button" type="button" aria-label="문서 목록 열기" aria-expanded="false">
              <span aria-hidden="true">☰</span>
            </button>
            <div>
              <p id="notePath" class="note-path">문서를 선택하세요</p>
              <div class="note-title-row">
                <h2 id="noteTitle">Obsidian Markdown Viewer</h2>
              </div>
            </div>
          </div>
          <div class="view-controls">
            <button id="historyBackButton" class="icon-button" type="button" disabled aria-label="이전 페이지" title="이전 페이지">←</button>
            <button id="historyForwardButton" class="icon-button" type="button" disabled aria-label="이후 페이지" title="이후 페이지">→</button>
            <button id="markdownToggleButton" class="icon-button" type="button" aria-pressed="false" aria-label="원본 보기 OFF" title="원본 보기 OFF">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4 5h16v14H4z" />
                <path d="M7 15V9l3 4 3-4v6" />
                <path d="M17 9v6" />
                <path d="m15 13 2 2 2-2" />
              </svg>
            </button>
            <button id="webEditButton" class="icon-button" type="button" disabled aria-label="웹에서 편집" title="웹에서 편집">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 20h9" />
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
              </svg>
            </button>
            <button id="randomFileButton" class="icon-button" type="button" aria-label="랜덤 Markdown 열기" title="랜덤 Markdown 열기">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M16 3h5v5" />
                <path d="M4 20 21 3" />
                <path d="M21 16v5h-5" />
                <path d="M15 15l6 6" />
                <path d="M4 4l5 5" />
              </svg>
            </button>
            <button id="calendarButton" class="icon-button" type="button" aria-label="Task 캘린더" title="Task 캘린더">📅</button>
          </div>
        </header>

        <section class="viewer-wrap">
          <div id="loadingOverlay" class="loading-overlay" hidden>
            <div class="loading-box">
              <div class="loading-spinner" aria-hidden="true"></div>
              <p id="loadingText">로딩 중...</p>
            </div>
          </div>
          <article id="markdownView" class="markdown-body empty-state">
            <h3>왼쪽 문서 목록에서 Markdown 파일을 선택하세요</h3>
            <p>Obsidian 폴더 구조, wiki link, 이미지 embed, callout, frontmatter를 기본적으로 표시합니다.</p>
          </article>
          <section id="editorShell" class="editor-shell" hidden>
            <div class="editor-toolbar">
              <span id="editorStatus">편집 중</span>
              <button id="saveEditButton" type="button">저장</button>
            </div>
            <div class="editor-split">
              <textarea id="markdownEditor" class="markdown-editor" spellcheck="false"></textarea>
            </div>
          </section>
          <article id="calendarView" class="calendar-view" hidden></article>
        </section>
      </main>
    </div>
    <div id="syncStatus" class="sync-status sync-status-bar" hidden></div>


    <div id="optionsBackdrop" class="options-backdrop" hidden></div>
    <section id="optionsMenu" class="options-modal" role="dialog" aria-modal="true" aria-labelledby="optionsTitle" hidden>
      <header class="options-header">
        <h2 id="optionsTitle">옵션</h2>
        <button id="optionsCloseButton" class="icon-button" type="button" aria-label="옵션 닫기">×</button>
      </header>

      <details class="option-node">
        <summary>화면</summary>
        <div class="option-node-body">
          <label class="option-field">
            <span>폰트</span>
            <select id="fontSelect">
              <option value="default">기본</option>
              <option value="ridibatang">리디바탕</option>
              <option value="nanum-myeongjo">나눔명조</option>
              <option value="nanum-gothic">나눔고딕</option>
              <option value="malgun-gothic">맑은고딕</option>
            </select>
          </label>
        </div>
      </details>


      <details class="option-node">
        <summary>캘린더</summary>
        <div class="option-node-body">
          <label class="option-field">
            <span>Task 검색 경로</span>
            <textarea id="calendarPathInput" rows="4" placeholder="Tasks/Work&#10;Daily"></textarea>
          </label>
          <label class="option-field">
            <span>Daily 노트 위치</span>
            <input id="dailyNotePathInput" type="text" placeholder="1. Daily" />
          </label>
          <p class="option-help">Task 캘린더에 포함할 Markdown 폴더 경로를 줄바꿈 또는 쉼표로 지정합니다. 비워두면 전체 vault의 task를 표시합니다.</p>
        </div>
      </details>
    </section>

    <div id="imageLightbox" class="image-lightbox" hidden>
      <button id="imageLightboxClose" class="image-lightbox-close" type="button" aria-label="이미지 닫기">×</button>
      <img id="imageLightboxImg" alt="" />
    </div>

    <script src="./app.js"></script>
  </body>
</html>
